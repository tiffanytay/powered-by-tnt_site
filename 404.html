<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Your Way? - Tiffany Tay</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E50914',
                        netflixBlack: '#141414',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #141414;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .error-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }
        .error-code {
            text-shadow: 0px 0px 50px rgba(229, 9, 20, 0.5);
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="error-bg px-4">
        <div class="max-w-2xl z-10">
            <div class="mb-8">
                <a href="/" class="text-primary font-black text-4xl tracking-tighter">TIFFANY TAY</a>
            </div>

            <h1 class="text-7xl md:text-9xl font-black mb-4 error-code">404</h1>
            
            <h2 class="text-2xl md:text-4xl font-bold mb-6">Lost your connection?</h2>
            
            <p class="text-lg md:text-xl text-gray-300 mb-10 leading-relaxed">
                The page you’re looking for isn't available in your region... or anywhere else. 
                But don't worry, the rest of our operations and analytics content is ready for you.
            </p>

            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="/" class="bg-white text-black px-10 py-3 rounded font-bold text-lg hover:bg-opacity-80 transition duration-300 flex items-center justify-center gap-2">
                   <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                   Tiffany Tay Home
                </a>
                <button onclick="window.history.back()" class="bg-gray-500 bg-opacity-50 text-white px-10 py-3 rounded font-bold text-lg hover:bg-opacity-40 transition duration-300">
                    Go Back
                </button>
            </div>

            <div class="mt-12 pt-8 border-t border-gray-700">
                <p class="text-gray-400 text-sm tracking-widest uppercase">
                    Error Code <span class="font-bold text-white">NSES-404</span>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
